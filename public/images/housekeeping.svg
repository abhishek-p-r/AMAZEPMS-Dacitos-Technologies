<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" rx="24" fill="#050914"/>
  <rect width="800" height="500" rx="24" fill="url(#bg_glow)"/>
  
  <g opacity="0.1">
    <path d="M0 50H800M0 100H800M0 150H800M0 200H800M0 250H800M0 300H800M0 350H800M0 400H800" stroke="#38BDF8" stroke-width="1"/>
    <path d="M100 0V500M200 0V500M300 0V500M400 0V500M500 0V500M600 0V500M700 0V500" stroke="#38BDF8" stroke-width="1"/>
  </g>

  <!-- Sparkle & Cleaning Halo Graphics -->
  <circle cx="400" cy="220" r="110" fill="url(#circle_grad)" stroke="#38BDF8" stroke-opacity="0.3" stroke-width="2"/>
  <circle cx="400" cy="220" r="80" fill="#0F172A" stroke="#38BDF8" stroke-width="2"/>

  <!-- Four Point Sparkle Icon -->
  <path d="M400 160 Q400 220 460 220 Q400 220 400 280 Q400 220 340 220 Q400 220 400 160 Z" fill="url(#sparkle_grad)"/>
  <path d="M440 160 Q440 185 465 185 Q440 185 440 210 Q440 185 415 185 Q440 185 440 160 Z" fill="#10B981"/>
  
  <!-- Floor Scrubbing Waves -->
  <path d="M260 320 Q400 290 540 320 Q400 350 260 320 Z" fill="#38BDF8" fill-opacity="0.15" stroke="#38BDF8" stroke-width="2"/>

  <!-- Badge -->
  <rect x="230" y="380" width="340" height="48" rx="12" fill="#0D1424" stroke="#38BDF8" stroke-opacity="0.3"/>
  <text x="400" y="410" text-anchor="middle" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" letter-spacing="2">MECHANIZED HOUSEKEEPING & HYGIENE</text>

  <defs>
    <radialGradient id="bg_glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(400 220) scale(400 250)">
      <stop stop-color="#38BDF8" stop-opacity="0.25"/>
      <stop offset="0.7" stop-color="#6366F1" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#050914" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="circle_grad" x1="290" y1="110" x2="510" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="sparkle_grad" x1="340" y1="160" x2="460" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
  </defs>
</svg>
