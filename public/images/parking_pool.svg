<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" rx="24" fill="#050C1A"/>
  <rect width="800" height="500" rx="24" fill="url(#bg_glow)"/>

  <g opacity="0.08">
    <path d="M0 50H800M0 100H800M0 150H800M0 200H800M0 250H800M0 300H800M0 350H800" stroke="#38BDF8" stroke-width="1"/>
    <path d="M100 0V500M200 0V500M300 0V500M400 0V500M500 0V500M600 0V500M700 0V500" stroke="#38BDF8" stroke-width="1"/>
  </g>

  <!-- Car & Water Waves Graphic -->
  <circle cx="400" cy="220" r="110" fill="url(#circle_grad)" stroke="#38BDF8" stroke-opacity="0.3" stroke-width="2"/>
  <circle cx="400" cy="220" r="80" fill="#0C152B" stroke="#38BDF8" stroke-width="2"/>

  <!-- Car Outline -->
  <path d="M350 220 Q365 190 400 190 Q435 190 450 220 H350 Z" stroke="#38BDF8" stroke-width="3" fill="none"/>
  <rect x="340" y="220" width="120" height="25" rx="6" stroke="#38BDF8" stroke-width="3" fill="#091021"/>
  <circle cx="365" cy="245" r="10" fill="#38BDF8"/>
  <circle cx="435" cy="245" r="10" fill="#38BDF8"/>

  <!-- Water Wave Lines -->
  <path d="M280 290 Q340 275 400 290 T520 290" stroke="#10B981" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Badge -->
  <rect x="230" y="380" width="340" height="48" rx="12" fill="#0C152B" stroke="#38BDF8" stroke-opacity="0.4"/>
  <text x="400" y="410" text-anchor="middle" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" letter-spacing="2">SMART PARKING & POOL MAINTENANCE</text>

  <defs>
    <radialGradient id="bg_glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(400 220) scale(400 250)">
      <stop stop-color="#38BDF8" stop-opacity="0.25"/>
      <stop offset="0.7" stop-color="#10B981" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#050C1A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="circle_grad" x1="290" y1="110" x2="510" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#10B981" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
</svg>
