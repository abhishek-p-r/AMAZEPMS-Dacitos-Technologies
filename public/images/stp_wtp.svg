<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" rx="24" fill="#040F18"/>
  <rect width="800" height="500" rx="24" fill="url(#bg_glow)"/>

  <g opacity="0.08">
    <path d="M0 50H800M0 100H800M0 150H800M0 200H800M0 250H800M0 300H800M0 350H800" stroke="#38BDF8" stroke-width="1"/>
    <path d="M100 0V500M200 0V500M300 0V500M400 0V500M500 0V500M600 0V500M700 0V500" stroke="#38BDF8" stroke-width="1"/>
  </g>

  <!-- Water Drop & Filtration Tank Graphic -->
  <circle cx="400" cy="220" r="110" fill="url(#circle_grad)" stroke="#38BDF8" stroke-opacity="0.3" stroke-width="2"/>
  <circle cx="400" cy="220" r="80" fill="#0A1C2C" stroke="#38BDF8" stroke-width="2"/>

  <!-- Water Drop Icon -->
  <path d="M400 160 C400 160 340 230 340 260 C340 293 367 320 400 320 C433 320 460 293 460 260 C460 230 400 160 400 160 Z" fill="url(#drop_grad)"/>
  <path d="M380 250 C380 235 400 210 400 210" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.6" fill="none"/>

  <!-- Badge -->
  <rect x="230" y="380" width="340" height="48" rx="12" fill="#0A1C2C" stroke="#38BDF8" stroke-opacity="0.4"/>
  <text x="400" y="410" text-anchor="middle" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" letter-spacing="2">STP & WTP ZERO LIQUID DISCHARGE</text>

  <defs>
    <radialGradient id="bg_glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(400 220) scale(400 250)">
      <stop stop-color="#38BDF8" stop-opacity="0.3"/>
      <stop offset="0.7" stop-color="#0284C7" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#040F18" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="circle_grad" x1="290" y1="110" x2="510" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#0284C7" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="drop_grad" x1="340" y1="160" x2="460" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#0284C7"/>
    </linearGradient>
  </defs>
</svg>
