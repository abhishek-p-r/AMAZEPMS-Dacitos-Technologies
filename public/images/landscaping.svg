<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" rx="24" fill="#040D10"/>
  <rect width="800" height="500" rx="24" fill="url(#bg_glow)"/>

  <g opacity="0.08">
    <path d="M0 50H800M0 100H800M0 150H800M0 200H800M0 250H800M0 300H800M0 350H800" stroke="#10B981" stroke-width="1"/>
    <path d="M100 0V500M200 0V500M300 0V500M400 0V500M500 0V500M600 0V500M700 0V500" stroke="#10B981" stroke-width="1"/>
  </g>

  <!-- Tree & Botanic Graphic -->
  <circle cx="400" cy="220" r="110" fill="url(#circle_grad)" stroke="#10B981" stroke-opacity="0.3" stroke-width="2"/>
  <circle cx="400" cy="220" r="80" fill="#061A14" stroke="#10B981" stroke-width="2"/>

  <!-- Twin Botanical Leaves -->
  <path d="M400 270 C350 240 340 180 400 150 C460 180 450 240 400 270 Z" fill="url(#leaf_grad)"/>
  <path d="M400 150 V270" stroke="#040D10" stroke-width="3"/>
  <path d="M400 190 L375 175 M400 210 L425 195 M400 230 L375 215 M400 250 L425 235" stroke="#040D10" stroke-width="2"/>

  <!-- Badge -->
  <rect x="230" y="380" width="340" height="48" rx="12" fill="#061A14" stroke="#10B981" stroke-opacity="0.4"/>
  <text x="400" y="410" text-anchor="middle" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" letter-spacing="2">CORPORATE HORTICULTURE & LANDSCAPING</text>

  <defs>
    <radialGradient id="bg_glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(400 220) scale(400 250)">
      <stop stop-color="#10B981" stop-opacity="0.3"/>
      <stop offset="0.7" stop-color="#059669" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#040D10" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="circle_grad" x1="290" y1="110" x2="510" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10B981" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="leaf_grad" x1="340" y1="150" x2="460" y2="270" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
  </defs>
</svg>
